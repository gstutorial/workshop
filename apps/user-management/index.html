<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User Management</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Force the dark theme to override the iframe's default background */
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- HEADER --- */
        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 25px; 
            flex-wrap: wrap; 
            gap: 15px;
        }

        .title-group h2 { font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
        .title-group p { font-size: 13px; color: #94a3b8; }

        .btn {
            border: none; border-radius: 14px; padding: 12px 20px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            transition: 0.2s;
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:active { transform: scale(0.95); }

        /* --- USER GRID & CARDS --- */
        .user-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px;
        }

        .user-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; 
            padding: 20px;
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: transform 0.2s;
        }

        .user-card:hover { transform: translateY(-4px); }

        /* Card Section 1: Identity */
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 15px;
        }

        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: white;
            box-shadow: 0 5px 15px rgba(59,130,246,0.4);
        }

        .user-meta { flex: 1; }
        .username { font-size: 18px; font-weight: 700; color: white; margin-bottom: 5px; }
        
        .badge-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 10px; font-weight: 700; }
        .badge-admin { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .badge-user { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .badge-status { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        /* Card Section 2: Apps */
        .card-apps {
            flex: 1;
        }
        .section-label { font-size: 12px; color: #94a3b8; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .app-item {
            background: rgba(0,0,0,0.2);
            border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .app-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
        .app-perms { font-size: 11px; color: #cbd5e1; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; }

        /* Card Section 3: Actions */
        .card-actions { 
            display: flex; gap: 10px; margin-top: 5px; 
        }
        .btn-edit { flex: 1; background: rgba(59,130,246,0.15); color: #60a5fa; padding: 10px; font-size: 13px; border: 1px solid rgba(59,130,246,0.3); }
        .btn-edit:hover { background: rgba(59,130,246,0.3); }
        
        .btn-danger { flex: 1; background: rgba(239,68,68,0.15); color: #f87171; padding: 10px; font-size: 13px; border: 1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background: rgba(239,68,68,0.3); }

        /* --- MODAL UI --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }

        .modal {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; width: 100%; max-width: 450px; padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto;
        }

        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 8px; font-weight: 700; }
        .form-control {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 14px; border-radius: 12px; outline: none; font-size: 14px; transition: 0.3s;
        }
        .form-control:focus { border-color: #3b82f6; background: rgba(0,0,0,0.5); }
        
        select.form-control option { background: #0f172a; color: white; }

        .app-permissions { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .app-permissions h4 { font-size: 14px; color: #e2e8f0; margin-bottom: 12px; }
        .checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; color: #94a3b8; }
        .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: #3b82f6; cursor: pointer; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 50px; color: white; font-weight: 700;
            z-index: 1100; display: none; text-align: center; font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Custom Scrollbar for iframe */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="header">
        <div class="title-group">
            <h2>User Management</h2>
            <p>Control system access, roles, and security.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add New User
        </button>
    </div>

    <div class="user-grid" id="userGrid">
        <div class="user-card">
            <div class="card-header">
                <div class="avatar">A</div>
                <div class="user-meta">
                    <div class="username">admin</div>
                    <div class="badge-group">
                        <span class="badge badge-admin">Admin</span>
                        <span class="badge badge-status">Active</span>
                    </div>
                </div>
            </div>
            <div class="card-apps">
                <div class="section-label">System Access</div>
                <div class="app-item">
                    <span class="app-name">All Applications</span>
                    <span class="app-perms">Full Control</span>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn btn-edit" onclick="alert('Admin editing locked in demo')">Edit Admin</button>
            </div>
        </div>

        <div class="user-card">
            <div class="card-header">
                <div class="avatar" style="background: linear-gradient(135deg, #10b981, #059669);">S</div>
                <div class="user-meta">
                    <div class="username">student_01</div>
                    <div class="badge-group">
                        <span class="badge badge-user">User</span>
                        <span class="badge badge-status">Active</span>
                    </div>
                </div>
            </div>
            <div class="card-apps">
                <div class="section-label">Assigned Applications</div>
                <div class="app-item">
                    <span class="app-name">Tuition Manager</span>
                    <span class="app-perms">View, Add</span>
                </div>
                <div class="app-item">
                    <span class="app-name">MCQ Quiz Maker</span>
                    <span class="app-perms">View</span>
                </div>
            </div>
            <div class="card-actions">
                <button class="btn btn-edit" onclick='openModal("edit", {"username":"student_01", "role":"User", "access":{"tuition-manager":["View", "Add"], "mcq-assessment":["View"]}})'>Edit Access</button>
                <button class="btn btn-danger" onclick="alert('Resetting password to plain text...')">Reset Pass</button>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Add New User</div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="m_username" class="form-control" placeholder="e.g., faculty_01">
            </div>

            <div class="form-group">
                <label>System Role</label>
                <select id="m_role" class="form-control" onchange="togglePermissionsUI()">
                    <option value="User">Standard User (Restricted)</option>
                    <option value="Admin">Administrator (Full Access)</option>
                </select>
            </div>

            <div class="form-group" id="m_password_group">
                <label>Temporary Password (For first login)</label>
                <input type="text" id="m_password" class="form-control" value="Welcome123">
            </div>

            <div id="permissionsSection">
                <label style="font-size: 13px; color: #cbd5e1; margin-bottom: 10px; display:block; font-weight: 700;">App Access & Permissions</label>
                
                <div class="app-permissions">
                    <h4>Tuition Manager</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="View"> View</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="Add"> Add</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="Edit"> Edit</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="Delete"> Delete</label>
                    </div>
                </div>

                <div class="app-permissions">
                    <h4>MCQ Quiz Maker</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="mcq-assessment" value="View"> View</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="mcq-assessment" value="Add"> Add</label>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()" id="saveBtn">Save User</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw8zzUWvMskW21zeSAc0ClXYp75q9g5_wcHxlABs6CascdJYD7K0u4InmAjiVKy1fGlFA/exec';
        
        const adminToken = localStorage.getItem('gs_token');
        const adminUsername = localStorage.getItem('gs_username');
        let currentMode = 'add'; 

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = type === 'error' ? 'linear-gradient(135deg, #ef4444, #dc2626)' : 'linear-gradient(135deg, #10b981, #059669)';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function openModal(mode, userData = null) {
            currentMode = mode;
            const modal = document.getElementById('userModal');
            const title = document.getElementById('modalTitle');
            
            document.getElementById('m_username').value = '';
            document.getElementById('m_role').value = 'User';
            document.getElementById('m_password').value = 'Welcome123';
            document.querySelectorAll('.perm-cb').forEach(cb => cb.checked = false);

            if (mode === 'add') {
                title.innerText = "Add New User";
                document.getElementById('m_username').disabled = false;
                document.getElementById('m_password_group').style.display = 'block';
            } else {
                title.innerText = "Edit User Access";
                document.getElementById('m_username').disabled = true;
                document.getElementById('m_password_group').style.display = 'none'; 
                
                document.getElementById('m_username').value = userData.username;
                document.getElementById('m_role').value = userData.role;
                
                if (userData.access) {
                    Object.keys(userData.access).forEach(app => {
                        userData.access[app].forEach(perm => {
                            const cb = document.querySelector(`.perm-cb[data-app="${app}"][value="${perm}"]`);
                            if (cb) cb.checked = true;
                        });
                    });
                }
            }
            
            togglePermissionsUI();
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('userModal').style.display = 'none';
        }

        function togglePermissionsUI() {
            const role = document.getElementById('m_role').value;
            const permSection = document.getElementById('permissionsSection');
            permSection.style.display = role === 'Admin' ? 'none' : 'block';
        }

        async function saveUser() {
            const user = document.getElementById('m_username').value;
            const role = document.getElementById('m_role').value;
            const pass = document.getElementById('m_password').value;
            
            let accessObj = {};
            if (role === 'User') {
                document.querySelectorAll('.perm-cb:checked').forEach(cb => {
                    const app = cb.getAttribute('data-app');
                    const perm = cb.value;
                    if (!accessObj[app]) accessObj[app] = [];
                    accessObj[app].push(perm);
                });
            } else {
                accessObj = { "all": ["Admin"] };
            }

            console.log("Preparing to send:", {
                action: currentMode === 'add' ? 'create_user' : 'update_user',
                targetUsername: user,
                role: role,
                accessJSON: JSON.stringify(accessObj),
                tempPassword: pass
            });

            showToast("UI is perfect! Waiting for backend connection.", "error");
            setTimeout(closeModal, 1000);
        }
    </script>
</body>
</html>
