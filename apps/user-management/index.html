<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>User Management</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            color: white;
            min-height: 100vh;
            padding: 15px; 
            overflow-x: hidden; 
        }

        /* --- HEADER --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }

        .title-group h2 { font-size: 20px; font-weight: 800; color: white; margin-bottom: 4px; }
        .title-group p { font-size: 12px; color: #94a3b8; }

        .btn {
            border: none; border-radius: 12px; padding: 10px 16px;
            font-size: 13px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; 
            transition: 0.2s;
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, #10b981, #059669); color: white; 
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:active { transform: scale(0.95); }

        /* --- USER GRID & CARDS --- */
        .user-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr)); 
            gap: 15px;
        }

        .user-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 18px;
            display: flex; flex-direction: column; gap: 15px;
            backdrop-filter: blur(10px); box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            transition: transform 0.2s;
        }

        .user-card:hover { transform: translateY(-3px); }

        .card-header {
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 12px;
        }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: white;
            box-shadow: 0 5px 15px rgba(59,130,246,0.4); flex-shrink: 0;
        }

        .user-meta { flex: 1; min-width: 0; }
        .username { font-size: 16px; font-weight: 700; color: white; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .badge-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 700; }
        .badge-admin { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .badge-user { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .badge-status { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .badge-firstlogin { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }

        .card-apps { flex: 1; }
        .section-label { font-size: 11px; color: #94a3b8; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .app-item {
            background: rgba(0,0,0,0.2); border-radius: 10px; padding: 8px 10px; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .app-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
        .app-perms { font-size: 10px; color: #cbd5e1; background: rgba(255,255,255,0.1); padding: 3px 6px; border-radius: 5px; }

        .card-actions { display: flex; gap: 8px; margin-top: 5px; }
        .btn-edit { flex: 1; background: rgba(59,130,246,0.15); color: #60a5fa; padding: 8px; font-size: 12px; border: 1px solid rgba(59,130,246,0.3); }
        .btn-edit:hover { background: rgba(59,130,246,0.3); }

        /* --- MODAL UI --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px;
        }

        .modal {
            background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; width: 100%; max-width: 420px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto;
        }

        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 6px; font-weight: 700; }
        .form-control {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 12px; border-radius: 10px; outline: none; font-size: 14px; transition: 0.3s;
        }
        .form-control:focus { border-color: #3b82f6; background: rgba(0,0,0,0.5); }
        select.form-control option { background: #0f172a; color: white; }

        .app-permissions { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .app-permissions h4 { font-size: 13px; color: #e2e8f0; margin-bottom: 10px; }
        .checkbox-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; color: #94a3b8; }
        .checkbox-label input[type="checkbox"] { width: 14px; height: 14px; accent-color: #3b82f6; cursor: pointer; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 30px; color: white; font-weight: 700;
            z-index: 1100; display: none; text-align: center; font-size: 13px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); white-space: nowrap;
        }

        @media (min-width: 768px) { body { padding: 20px; } .header { margin-bottom: 30px; } .user-card { padding: 22px; } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="header">
        <div class="title-group">
            <h2>User Management</h2>
            <p>Control system access, roles, and security.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add New User
        </button>
    </div>

    <div class="user-grid" id="userGrid">
        <div style="color: #94a3b8; padding: 20px;">Fetching users from database...</div>
    </div>

    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-title" id="modalTitle">Add New User</div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="m_username" class="form-control" placeholder="e.g., student_01">
            </div>

            <div class="form-group">
                <label>System Role</label>
                <select id="m_role" class="form-control" onchange="togglePermissionsUI()">
                    <option value="User">Standard User (Restricted)</option>
                    <option value="Admin">Administrator (Full Access)</option>
                </select>
            </div>

            <div class="form-group" id="m_password_group">
                <label id="m_password_label">Temporary Password (For first login)</label>
                <input type="text" id="m_password" class="form-control" value="Welcome123">
            </div>

            <div id="permissionsSection">
                <label style="font-size: 12px; color: #cbd5e1; margin-bottom: 8px; display:block; font-weight: 700;">App Access & Permissions</label>
                
                <div class="app-permissions">
                    <h4>Tuition Manager</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="View"> View</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="Add"> Add</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="Edit"> Edit</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="tuition-manager" value="Delete"> Delete</label>
                    </div>
                </div>

                <div class="app-permissions">
                    <h4>MCQ Quiz Maker</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="mcq-assessment" value="View"> View</label>
                        <label class="checkbox-label"><input type="checkbox" class="perm-cb" data-app="mcq-assessment" value="Add"> Add</label>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()" id="saveBtn">Save User</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycby3Mtence5PzA46V8RCWubEqHEzwI6DdtsXv_0mNaQZc77Ni_Fho9tPpc55yHPD8tZHhg/exec';
        
        // Grab admin credentials from the parent dashboard window
        const adminToken = localStorage.getItem('gs_token');
        const adminUsername = localStorage.getItem('gs_username');
        let currentMode = 'add'; 

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.background = type === 'error' ? 'linear-gradient(135deg, #ef4444, #dc2626)' : 'linear-gradient(135deg, #10b981, #059669)';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // --- FETCH LIVE USERS ---
        async function loadUsers() {
            const grid = document.getElementById('userGrid');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_users', adminUsername: adminUsername, adminToken: adminToken })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    grid.innerHTML = ''; 
                    result.users.forEach(user => {
                        grid.appendChild(createUserCard(user));
                    });
                } else {
                    grid.innerHTML = `<div style="color:#ef4444;">Error: ${result.message}</div>`;
                }
            } catch (error) {
                grid.innerHTML = '<div style="color:#ef4444;">Network Error. Check connection.</div>';
            }
        }

        // --- BUILD USER CARDS ---
        function createUserCard(user) {
            const card = document.createElement('div');
            card.className = 'user-card';
            
            const badgeClass = user.role === 'Admin' ? 'badge-admin' : 'badge-user';
            
            // Handle different statuses
            let statusClass = 'badge-status';
            let statusText = user.status;
            if (user.status === 'First_Login') { statusClass = 'badge-firstlogin'; statusText = 'Pending Setup'; }
            if (user.status === 'Suspended') { statusClass = 'badge-admin'; }
            
            const avatarLetter = user.username.charAt(0).toUpperCase();
            
            let appsHtml = '';
            if (user.role === 'Admin') {
                appsHtml = `<div class="app-item"><span class="app-name">All Applications</span><span class="app-perms">Full Control</span></div>`;
            } else if (Object.keys(user.access).length === 0) {
                appsHtml = `<div class="app-item" style="color:#94a3b8; background: transparent;">No Apps Assigned</div>`;
            } else {
                for (const [appName, perms] of Object.entries(user.access)) {
                    appsHtml += `<div class="app-item"><span class="app-name">${appName.replace('-', ' ').toUpperCase()}</span><span class="app-perms">${perms.join(', ')}</span></div>`;
                }
            }

            const safeUserObj = JSON.stringify(user).replace(/'/g, "&#39;");

            card.innerHTML = `
                <div class="card-header">
                    <div class="avatar">${avatarLetter}</div>
                    <div class="user-meta">
                        <div class="username">${user.username}</div>
                        <div class="badge-group">
                            <span class="badge ${badgeClass}">${user.role}</span>
                            <span class="badge ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                </div>
                <div class="card-apps">
                    <div class="section-label">System Access</div>
                    ${appsHtml}
                </div>
                <div class="card-actions">
                    <button class="btn btn-edit" onclick='openModal("edit", ${safeUserObj})'>Edit User</button>
                </div>
            `;
            return card;
        }

        // --- MODAL LOGIC ---
        function openModal(mode, userData = null) {
            currentMode = mode;
            const modal = document.getElementById('userModal');
            document.getElementById('m_username').value = '';
            document.getElementById('m_role').value = 'User';
            document.getElementById('m_password').value = '';
            document.querySelectorAll('.perm-cb').forEach(cb => cb.checked = false);

            if (mode === 'add') {
                document.getElementById('modalTitle').innerText = "Add New User";
                document.getElementById('m_username').disabled = false;
                document.getElementById('m_password_group').style.display = 'block';
                document.getElementById('m_password_label').innerText = "Temporary Password";
                document.getElementById('m_password').value = 'Welcome123';
                document.getElementById('m_password').placeholder = "";
            } else {
                document.getElementById('modalTitle').innerText = "Edit User";
                document.getElementById('m_username').disabled = true;
                document.getElementById('m_password_group').style.display = 'block'; 
                document.getElementById('m_password_label').innerText = "Reset Password (Optional)";
                document.getElementById('m_password').value = '';
                document.getElementById('m_password').placeholder = "Leave blank to keep current password";
                
                document.getElementById('m_username').value = userData.username;
                document.getElementById('m_role').value = userData.role;
                
                if (userData.access && userData.role !== 'Admin') {
                    Object.keys(userData.access).forEach(app => {
                        userData.access[app].forEach(perm => {
                            const cb = document.querySelector(`.perm-cb[data-app="${app}"][value="${perm}"]`);
                            if (cb) cb.checked = true;
                        });
                    });
                }
            }
            togglePermissionsUI();
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('userModal').style.display = 'none'; }

        function togglePermissionsUI() {
            document.getElementById('permissionsSection').style.display = document.getElementById('m_role').value === 'Admin' ? 'none' : 'block';
        }

        // --- SEND DATA TO APPS SCRIPT ---
        async function saveUser() {
            const user = document.getElementById('m_username').value.trim();
            const role = document.getElementById('m_role').value;
            const pass = document.getElementById('m_password').value.trim();
            
            if (!user) return showToast("Username is required", "error");

            let accessObj = {};
            if (role === 'User') {
                document.querySelectorAll('.perm-cb:checked').forEach(cb => {
                    const app = cb.getAttribute('data-app');
                    if (!accessObj[app]) accessObj[app] = [];
                    accessObj[app].push(cb.value);
                });
            } else {
                accessObj = { "all": ["Admin"] };
            }

            const payload = {
                action: currentMode === 'add' ? 'create_user' : 'update_user',
                adminUsername: adminUsername,
                adminToken: adminToken,
                targetUsername: user,
                role: role,
                accessJSON: JSON.stringify(accessObj),
                tempPassword: pass
            };

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Saving...";

            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === 'success') {
                    showToast(result.message, "success");
                    closeModal();
                    loadUsers(); // Refresh the grid to show new changes
                } else {
                    showToast(result.message, "error");
                }
            } catch (error) {
                showToast("Network Error", "error");
            }
            
            saveBtn.disabled = false;
            saveBtn.innerText = "Save User";
        }

        // Initialize App on Load
        window.onload = loadUsers;
    </script>
</body>
</html>
