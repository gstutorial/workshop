<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Cache Busting Meta Tags for Instant Updates -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>G. S. Tutorial - Dashboard</title>

    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 40%, #020617 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- MOBILE FIRST HEADER LAYOUT --- */
        .sidebar {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo {
            width: 45px; height: 45px; border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); object-fit: contain;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            display: none; /* Hidden on mobile for a cleaner look */
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            border-radius: 50%;
            align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px;
        }

        .user-info h3 { font-size: 15px; margin-bottom: 4px; }
        
        .role-badge {
            font-size: 11px; padding: 3px 8px; border-radius: 10px;
            background: rgba(37,99,235,0.3); color: #60a5fa; border: 1px solid rgba(37,99,235,0.5);
            display: inline-block;
        }
        .role-admin { background: rgba(220,38,38,0.3); color: #f87171; border-color: rgba(220,38,38,0.5); }

        .nav-bottom {
            display: flex;
            align-items: center;
        }

        .logout-btn {
            background: rgba(239,68,68,0.15); color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px; padding: 10px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.8); color: white; }
        
        .logout-text { display: none; } /* Hidden on mobile */
        .creator-tag { display: none; } /* Hidden on mobile */

        .main-arena {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        /* --- DESKTOP OVERRIDE LAYOUT --- */
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            
            .sidebar {
                width: 280px;
                flex-direction: column;
                justify-content: flex-start;
                border-bottom: none;
                border-right: 1px solid rgba(255,255,255,0.1);
                padding: 30px 20px;
                height: 100vh;
            }

            .sidebar-brand {
                flex-direction: column;
                width: 100%;
                margin-bottom: 30px;
                gap: 20px;
            }

            .sidebar-logo {
                width: 80px; height: 80px; margin-bottom: 0;
            }

            .avatar { display: flex; } /* Restored on desktop */
            
            .user-profile { width: 100%; justify-content: flex-start; }

            .nav-bottom {
                margin-top: auto; width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .logout-btn {
                background: rgba(255,255,255,0.1); color: white; border: none;
                padding: 12px; margin-top: 20px;
            }
            .logout-text { display: block; font-weight: bold; }
            
            .creator-tag {
                display: block; text-align: center; font-size: 13px; 
                color: #94a3b8; margin-top: 15px; font-weight: 600;
            }
        }

        /* --- APP GRID COMPONENTS --- */
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: #e2e8f0; }
        
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .app-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 20px; cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            display: flex; flex-direction: column; gap: 10px;
        }

        .app-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }

        .app-icon {
            width: 50px; height: 50px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 5px;
        }
        
        .icon-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .icon-green { background: linear-gradient(135deg, #10b981, #059669); }
        .icon-purple { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

        .app-name { font-size: 18px; font-weight: 700; }
        .app-desc { font-size: 13px; color: #94a3b8; line-height: 1.4; }
        
        .permission-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: auto; }
        .perm-tag {
            font-size: 10px; padding: 4px 8px; border-radius: 6px;
            background: rgba(255,255,255,0.1); color: #cbd5e1;
        }

        /* --- IFRAME VIEWER --- */
        #appViewer {
            display: none; width: 100%; height: 100%; border: none; border-radius: 20px;
            background: transparent; flex: 1; min-height: 80vh;
        }

        #dashboardContent { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        .back-nav {
            display: none; align-items: center; gap: 10px; cursor: pointer;
            font-weight: bold; color: #38bdf8; margin-bottom: 10px;
        }

        /* PWA Install Button */
        .install-fab {
            position: fixed; bottom: 20px; right: 20px;
            background: linear-gradient(135deg, #10b981, #059669); color: white;
            border: none; border-radius: 50px; padding: 14px 24px;
            font-size: 15px; font-weight: 800; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            cursor: pointer; z-index: 1000; display: none; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- UPDATED RESPONSIVE SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <img src="logo.png" alt="GS Logo" class="sidebar-logo" onerror="this.style.display='none'">
                <div class="user-profile">
                    <div class="avatar" id="userInitials">U</div>
                    <div class="user-info">
                        <h3 id="displayUsername">Loading...</h3>
                        <div class="role-badge" id="displayRole">User</div>
                    </div>
                </div>
            </div>

            <div class="nav-bottom">
                <button class="logout-btn" onclick="logout()" title="Secure Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="logout-text">Secure Logout</span>
                </button>
                <div class="creator-tag">App Created By Gobind Sharma</div>
            </div>
        </div>

        <div class="main-arena">
            
            <div class="back-nav" id="backBtn" onclick="closeApp()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Dashboard
            </div>

            <div id="dashboardContent">
                <div id="adminSection" style="display: none;">
                    <div class="section-title">System Administration</div>
                    <div class="app-grid" style="margin-bottom: 30px;">
                        
                        <div class="app-card" onclick="openApp('admin-panel', 'apps/user-management/index.html', ['Full Access'])">
                            <div class="app-icon icon-purple">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            </div>
                            <div class="app-name">User Management</div>
                            <div class="app-desc">Create users, reset passwords, and configure access levels.</div>
                        </div>

                    </div>
                </div>

                <div class="section-title">Your Applications</div>
                <div class="app-grid" id="appList">
                    <!-- Apps inject here dynamically -->
                </div>
            </div>

            <iframe id="appViewer" src=""></iframe>
        </div>
    </div>

    <button id="installAppBtn" class="install-fab">📲 Install App</button>

    <script>
        // ==========================================
        // PWA INSTALL LOGIC
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.update();
                });
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            installBtn.style.display = 'none';
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
        });

        // ==========================================
        // CONFIGURATION
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycby3Mtence5PzA46V8RCWubEqHEzwI6DdtsXv_0mNaQZc77Ni_Fho9tPpc55yHPD8tZHhg/exec';
        const HEARTBEAT_INTERVAL = 5 * 60 * 1000; 

        const APP_DIRECTORY = {
            "tuition-manager": {
                name: "Tuition Manager",
                desc: "Track student fees, manage logins, and generate PDF report cards.",
                iconClass: "icon-blue",
                path: "apps/tuition-manager/index.html",
                iconSVG: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>`
            },
            "mcq-assessment": {
                name: "MCQ Quiz Maker",
                desc: "Class 9 & 10 Mathematics and Science examination delivery.",
                iconClass: "icon-green",
                path: "apps/mcq-assessment/index.html",
                iconSVG: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
            }
        };

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.onload = () => {
            const token = localStorage.getItem('gs_token');
            const username = localStorage.getItem('gs_username');
            
            if (!token || !username) {
                window.location.href = 'index.html';
                return;
            }

            renderSidebar(username);
            buildDashboard();
            startHeartbeat();
        };

        function renderSidebar(username) {
            const role = localStorage.getItem('gs_role') || 'User';
            document.getElementById('displayUsername').innerText = username;
            document.getElementById('userInitials').innerText = username.charAt(0).toUpperCase();
            
            const roleBadge = document.getElementById('displayRole');
            roleBadge.innerText = role;
            if (role === 'Admin') {
                roleBadge.classList.add('role-admin');
                document.getElementById('adminSection').style.display = 'block';
            }
        }

        // ==========================================
        // DYNAMIC APP RENDERING
        // ==========================================
        function buildDashboard() {
            const role = localStorage.getItem('gs_role');
            let accessData = {};
            
            try { accessData = JSON.parse(localStorage.getItem('gs_access')) || {}; } 
            catch (e) {}

            const appListContainer = document.getElementById('appList');
            appListContainer.innerHTML = ''; 

            if (role === 'Admin') {
                Object.keys(APP_DIRECTORY).forEach(appId => {
                    appListContainer.appendChild(createAppCard(appId, ["All Access"]));
                });
                return;
            }

            const allowedApps = Object.keys(accessData);
            if (allowedApps.length === 0) {
                appListContainer.innerHTML = '<div style="color: #94a3b8;">No applications assigned to this account.</div>';
                return;
            }

            allowedApps.forEach(appId => {
                if (APP_DIRECTORY[appId]) {
                    appListContainer.appendChild(createAppCard(appId, accessData[appId]));
                }
            });
        }

        function createAppCard(appId, permissionsArr) {
            const app = APP_DIRECTORY[appId];
            const card = document.createElement('div');
            card.className = 'app-card';
            card.onclick = () => openApp(appId, app.path, permissionsArr);

            const tagsHTML = permissionsArr.map(p => `<div class="perm-tag">${p}</div>`).join('');

            card.innerHTML = `
                <div class="app-icon ${app.iconClass}">
                    ${app.iconSVG}
                </div>
                <div class="app-name">${app.name}</div>
                <div class="app-desc">${app.desc}</div>
                <div class="permission-tags">${tagsHTML}</div>
            `;
            return card;
        }

        // ==========================================
        // IFRAME APP LAUNCHER
        // ==========================================
        function openApp(appId, path, permissions) {
            document.getElementById('dashboardContent').style.display = 'none';
            document.getElementById('backBtn').style.display = 'flex';
            
            const viewer = document.getElementById('appViewer');
            const encodedPerms = encodeURIComponent(JSON.stringify(permissions));
            viewer.src = `${path}?perms=${encodedPerms}`;
            viewer.style.display = 'block';
        }

        function closeApp() {
            document.getElementById('appViewer').src = '';
            document.getElementById('appViewer').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('dashboardContent').style.display = 'flex';
        }

        // ==========================================
        // SECURITY HEARTBEAT
        // ==========================================
        function startHeartbeat() {
            setInterval(async () => {
                const user = localStorage.getItem('gs_username');
                const token = localStorage.getItem('gs_token');
                
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'heartbeat', username: user, token: token })
                    });
                    const result = await response.json();
                    
                    if (result.status === 'expired') {
                        alert("Session expired due to inactivity or invalid token. Please log in again.");
                        logout();
                    }
                } catch (error) {}
            }, HEARTBEAT_INTERVAL);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
